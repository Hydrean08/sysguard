# sysguard config — copy to config.yaml and edit, then `systemctl --user restart sysguard`.
# Ships in dry-run: NOTHING is killed/restarted/capped until you flip dry_run to false.

# --- runtime ---
sample_interval_seconds: 30
history_window_samples: 60          # 60 * 30s = 30 min rolling window (live detection)
dry_run: true                        # audit-only. Watch decisions.jsonl for a week, then set false.

# --- history (durable time-series sink) ---
# Live detection uses the in-memory window above. This SEPARATELY persists every
# per-unit RSS sample + system stats to SQLite at ~/.local/share/sysguard/history.db
# so long-term trends survive restarts and can be graphed / post-mortemed.
# Passive recorder — never in the kill/restart path.
history_db_enabled: true
history_retention_days: 30
history_prune_interval_seconds: 3600

# --- AI root-cause escalation (headless Claude) ---
# On a terminal "investigate" (local models stumped), escalate to headless Claude
# for a no-tools root-cause diagnosis over evidence sysguard already gathered.
# Diagnosis + fix are logged (ai_proposals.jsonl) and pushed to the phone; Claude
# never touches the system. Expensive — hard rate-limited + skipped when tight.
ai_diagnose_enabled: false           # opt-in; needs Claude Code CLI installed + authed
claude_bin: /path/to/claude          # absolute path (systemd user PATH is minimal)
ai_model: opus                       # headless Claude model (opus|sonnet|haiku or full id)
ai_min_available_mb: 2048            # skip when the box is already low on memory
ai_per_unit_cooldown_hours: 6        # one diagnosis per unit per window
ai_max_per_day: 8                    # global daily cap (bounds cost)
ai_timeout_seconds: 150
# Self-tuning: auto-raise a unit's floor when Claude confirms a false positive
# (bounded — never touches a running service, only quiets sysguard on that unit).
ai_autotune_enabled: true
ai_autotune_max_floor_frac: 0.8      # auto-floor <= this fraction of a container's cap
ai_autotune_max_floor_mb: 8192       # ceiling for uncapped units

# --- ollama (local LLM triage) ---
ollama_url: http://localhost:11434
primary_model: phi4-mini:3.8b        # fast triage every cycle
escalation_model: glm4:9b            # for "investigate" labels
fallback_model: qwen3:1.7b           # used when system memory is critical
ollama_timeout_seconds: 60           # cold model load can take 30-45s
ollama_num_threads: 4                # CPU threads per inference call

# --- detection thresholds (flag a unit for triage if ANY are true) ---
rss_absolute_mb: 4096                # over 4GB resident (new units without a baseline yet)
rss_growth_mb_per_min: 50            # growing faster than 50MB/min over the recent window
rss_jump_mb: 500                     # jumped >500MB in a single sample
rss_jump_min_samples: 5              # ignore jump threshold until N samples collected
system_available_mb_floor: 2048      # below 2GB free -> triage everything > 1GB
system_critical_available_mb: 1024   # below 1GB -> crisis mode (use fallback model)
escalation_min_available_mb: 8192    # skip escalation model if less free than this

# swap saturation — available_mb counts reclaimable cache, so a box can sit at
# 99% swap (one spike from OOM) while every other signal reads healthy.
swap_used_pct_warn: 85               # notify at this swap %
swap_used_pct_crit: 95               # notify (OOM risk) at this swap %
system_swap_pct_floor: 90            # triage units >1GB when swap >= this AND stalling
system_swap_psi_full_min: 5.0        # PSI full-stall avg10 required alongside swap floor
oom_forecast_warn_min: 30            # alert when forecast time-to-OOM drops below this (min)

# --- adaptive baseline ---
baseline_multiplier: 2.0             # flag when RSS exceeds N x the learned baseline (0 = disable)
baseline_min_samples: 20             # samples before adaptive mode activates (~10 min)

# --- intervention rules ---
max_actions_per_unit_per_hour: 1     # prevents flap loops
require_confirm_for_kill: true
allowed_actions: [restart, cap]      # 'kill' deliberately omitted
default_cap_mb: 0                    # 0 = compute as 1.5x baseline RSS; or set absolute MB

# --- action safety gate --- (flag/alert still happen; these gate EXECUTION only)
skip_os_capped_units: true           # don't act on units the OS already memory-limits
                                     # (systemd MemoryMax/High or docker --memory) — OS owns their OOM
action_grace_samples: 20             # don't restart/cap a unit until it has this many samples
                                     # (~10 min) unless system critical — protects new programs
min_signals_to_act: 2                # auto-act only when >= this many thresholds fire…
strong_signal_ratio: 2.0             # …OR one signal exceeds its threshold by this factor
                                     # …OR system < critical floor. Lone marginal signal = alert-only.

# --- skip list ---
# Hardcoded skips (your shell, sshd, the desktop session, ollama, etc.) are always
# merged in by the code. Add your own here. Names match a systemd unit OR process comm.
extra_skip_units:
  # - docker:my-database     # example: a container you already cap via its own limits
extra_skip_processes: []

# --- per-unit action overrides ---
# Force a specific action for units where you already know the right fix.
# Key matches the friendly name (substring); value is the forced action.
unit_action_overrides:
  # - my-fuse-daemon: restart   # example: a cache-growing daemon a restart cleanly reclaims

# --- per-unit RSS floors ---
# Ignore a unit entirely below this RSS (overrides the global floor). Useful for units
# whose working set legitimately swings high (read-ahead buffers, JIT heaps).
unit_rss_floor_mb:
  # - my-fuse-daemon: 2500

# --- disk monitoring (edge-triggered: one alert on entering warn, again only on
# worsening to crit or once/day while still low; recovery is logged, not pushed) ---
disk_root_warn_mb: 20480
disk_root_crit_mb: 10240
disk_pool_warn_mb: 30720
disk_pool_crit_mb: 10240
disk_remind_sec: 86400
disk_reclaim_enabled: true           # docker-pool low → propose a one-tap safe reclaim
disk_reclaim_min_mb: 2048            # only propose if >= this much is safely reclaimable
disk_reclaim_timeout_sec: 1200       # per-op prune timeout; runs detached (won't block the loop)

# --- phone notifications (ntfy) ---
# Install the ntfy app, subscribe to your topic, done. Pick something unguessable.
ntfy_url: https://ntfy.sh
ntfy_topic: ""                       # set to a private, random string to enable, e.g. "sysguard-x7k2m9"
ntfy_token: ""                       # only for access-controlled topics
ntfy_min_priority: 1                 # send notifications >= this (1=all ... 5=crit only)

# --- notifications ---
kde_notify: true
notify_on_dry_run: false
log_level: INFO
